# NATS Server Configuration for IMPALA
# Allow large model payloads

# Network settings
port: 4222

# JetStream configuration
jetstream {
    store_dir: "./jetstream"
    max_memory_store: 1GB
    max_file_store: 10GB
}

# Increase limits for large model distribution
# max_pending must be >= max_payload
max_pending: 134217728       # 128MB
max_payload: 104857600       # 100MB

# Timeouts
write_deadline: "30s"

# Debug mode
debug: false
trace: false
