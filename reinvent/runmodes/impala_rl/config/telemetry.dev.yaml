# Telemetry Configuration for Development Environment
# This config enables full observability with 100% sampling for local development

service:
  name: reinvent-impala
  version: "1.0.0"
  environment: dev

traces:
  enabled: true
  exporter:
    type: otlp  # Options: otlp, console, noop
    endpoint: http://localhost:4317
    insecure: true
    headers: {}
    timeout_seconds: 10
  sampling:
    type: always_on  # Options: always_on, always_off, parent_based, trace_id_ratio
    ratio: 1.0  # 100% sampling for dev
  resource_attributes:
    deployment.environment: development
    service.namespace: impala-rl

metrics:
  enabled: true
  exporter:
    type: otlp
    endpoint: http://localhost:4317
    insecure: true
    headers: {}
    timeout_seconds: 10
  interval_seconds: 30  # Export metrics every 30 seconds
  views:
    histogram_boundaries: [0.01, 0.05, 0.1, 0.5, 1.0, 2.0, 5.0, 10.0]

logs:
  enabled: true
  level: DEBUG  # Verbose logging for development
  format: json  # Options: json, text
  exporter:
    type: otlp
    endpoint: http://localhost:4317
    insecure: true
    headers: {}
    timeout_seconds: 10
  include_trace_context: true
